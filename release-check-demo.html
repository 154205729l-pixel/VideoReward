<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>UnifiedRewardSDK 上线验收页</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #fff;
      --line: #d8e1ec;
      --text: #10233b;
      --sub: #516a86;
      --ok: #0a7d4f;
      --warn: #b45309;
      --bad: #b91c1c;
      --brand: #0f766e;
      --brand2: #0c4a6e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at 0 0, #e9f5f2, var(--bg) 42%);
      color: var(--text);
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }
    .wrap { max-width: 980px; margin: 0 auto; padding: 16px; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
      box-shadow: 0 4px 16px rgba(15, 23, 42, 0.04);
    }
    h1 { margin: 0 0 8px; font-size: 20px; }
    p.tip { margin: 4px 0; color: var(--sub); font-size: 13px; line-height: 1.5; }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    @media (max-width: 760px) {
      .grid { grid-template-columns: 1fr; }
    }
    label { display: block; margin-bottom: 4px; color: var(--sub); font-size: 13px; }
    input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
      color: var(--text);
      background: #fff;
    }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; }
    button {
      border: 0;
      border-radius: 8px;
      padding: 10px 14px;
      color: #fff;
      background: var(--brand);
      font-size: 13px;
      cursor: pointer;
    }
    button.secondary { background: var(--brand2); }
    button.warn { background: var(--warn); }
    .checklist { margin: 0; padding: 0; list-style: none; }
    .check-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      margin-bottom: 8px;
      font-size: 13px;
    }
    .status-pill {
      border-radius: 999px;
      padding: 2px 10px;
      font-size: 12px;
      color: #fff;
      background: #64748b;
    }
    .ok { background: var(--ok); }
    .bad { background: var(--bad); }
    .warn-pill { background: var(--warn); }
    pre {
      margin: 0;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #0b1020;
      color: #dbeafe;
      overflow: auto;
      max-height: 360px;
      font-size: 12px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .small { color: var(--sub); font-size: 12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>UnifiedRewardSDK 上线验收页（只支持真实 App Bridge）</h1>
      <p class="tip">此页面已禁用浏览器 mock。若不在 App WebView 里，检查会直接失败。</p>
      <p class="tip">目标：确认 iOS/Android 自动路由正确，真实广告链路可用。</p>
    </div>

    <div class="card">
      <div class="grid">
        <div>
          <label for="platform">平台策略</label>
          <select id="platform">
            <option value="auto">auto（按设备自动）</option>
            <option value="ios">ios（强制）</option>
            <option value="android">android（强制）</option>
          </select>
        </div>
        <div>
          <label for="pgid">pgid</label>
          <input id="pgid" value="1.15.2" />
        </div>
        <div>
          <label for="sceneId">sceneId</label>
          <input id="sceneId" value="leagueCollect_14" />
        </div>
        <div>
          <label for="rewardName">reward_name</label>
          <input id="rewardName" value="coin" />
        </div>
      </div>
      <div class="actions" style="margin-top:10px;">
        <button class="secondary" id="btnInit">1. 初始化并检查 bridge</button>
        <button id="btnAd">2. adRequest</button>
        <button id="btnPreload">3. preLoadVideo</button>
        <button id="btnShow">4. connectVideo</button>
        <button class="warn" id="btnRunAll">一键完整验收</button>
      </div>
    </div>

    <div class="card">
      <div class="small" style="margin-bottom:8px;">上线检查清单</div>
      <ul class="checklist">
        <li class="check-item">是否在 App WebView（有真实 bridge）<span id="cBridge" class="status-pill">未检查</span></li>
        <li class="check-item">设备识别与路由是否正确<span id="cRoute" class="status-pill">未检查</span></li>
        <li class="check-item">adRequest 是否成功<span id="cAd" class="status-pill">未检查</span></li>
        <li class="check-item">preLoadVideo 是否成功<span id="cPreload" class="status-pill">未检查</span></li>
        <li class="check-item">connectVideo 是否成功触发<span id="cShow" class="status-pill">未检查</span></li>
      </ul>
    </div>

    <div class="card">
      <div class="small" style="margin-bottom:8px;">最近 payload</div>
      <pre id="payloadPanel">{}</pre>
    </div>

    <div class="card">
      <div class="small" style="margin-bottom:8px;">运行日志</div>
      <pre id="logPanel"></pre>
    </div>
  </div>

  <script src="../unified-reward-bridge.js"></script>
  <script>
    (function () {
      var sdk = null;
      var payload = null;

      var el = {
        platform: document.getElementById('platform'),
        pgid: document.getElementById('pgid'),
        sceneId: document.getElementById('sceneId'),
        rewardName: document.getElementById('rewardName'),
        btnInit: document.getElementById('btnInit'),
        btnAd: document.getElementById('btnAd'),
        btnPreload: document.getElementById('btnPreload'),
        btnShow: document.getElementById('btnShow'),
        btnRunAll: document.getElementById('btnRunAll'),
        cBridge: document.getElementById('cBridge'),
        cRoute: document.getElementById('cRoute'),
        cAd: document.getElementById('cAd'),
        cPreload: document.getElementById('cPreload'),
        cShow: document.getElementById('cShow'),
        payloadPanel: document.getElementById('payloadPanel'),
        logPanel: document.getElementById('logPanel')
      };

      function log(title, data) {
        var text = '[' + new Date().toLocaleTimeString() + '] ' + title;
        if (typeof data !== 'undefined') {
          try {
            text += '\n' + JSON.stringify(data, null, 2);
          } catch (e) {
            text += '\n' + String(data);
          }
        }
        el.logPanel.textContent += text + '\n\n';
        el.logPanel.scrollTop = el.logPanel.scrollHeight;
      }

      function setCheck(target, type, text) {
        target.className = 'status-pill ' + (type || '');
        target.textContent = text;
      }

      function detectDevice() {
        var ua = navigator.userAgent.toLowerCase();
        if (/android/.test(ua)) return 'android';
        if (/iphone|ipad|ipod|ios/.test(ua)) return 'ios';
        return 'unknown';
      }

      function hasRealBridge() {
        var wvjb = window.WebViewJavascriptBridge && window.WebViewJavascriptBridge.callHandler;
        var bridge = window.$bridge && window.$bridge.callHandler;
        var isMock = !!window.__UNIFIED_MOCK_BRIDGE__;
        return !!(wvjb || bridge) && !isMock;
      }

      function buildConfig() {
        var pgid = el.pgid.value.trim() || '1.15.2';
        return {
          platform: el.platform.value,
          sceneId: el.sceneId.value.trim() || 'leagueCollect_14',
          adRequest: {
            ios: {
              param: {
                apname: 'DProApp',
                apvc: '8.5.2',
                os: 'ios',
                platform: '1',
                position: '0',
                pgid: pgid
              }
            },
            android: {
              param: {
                pgid: pgid
              }
            }
          },
          reward: {
            reward_name: el.rewardName.value.trim() || 'coin',
            reward_amount: '1',
            data: '',
            pgid: pgid
          },
          behavior: {
            callbackTimeout: 10000,
            bridgeDetectTimeout: 5000
          }
        };
      }

      function ensureSdk() {
        if (sdk) return;

        if (!hasRealBridge()) {
          setCheck(el.cBridge, 'bad', '失败');
          throw new Error('未检测到真实 App bridge，请在 App WebView 中打开此页');
        }

        setCheck(el.cBridge, 'ok', '通过');
        window.__UNIFIED_REWARD_CONFIG = buildConfig();

        sdk = window.UnifiedRewardSDK.create({
          onLog: function (title, data) {
            log('SDK: ' + title, data);
          }
        });

        sdk.onDisconnectVideo(function (result) {
          log('收到 disConnectVideo', result);
        });
      }

      function checkRoute(platform) {
        var device = detectDevice();
        var effective = platform === 'auto' ? (device === 'unknown' ? 'android' : device) : platform;
        if (device !== 'unknown' && effective !== device) {
          setCheck(el.cRoute, 'warn-pill', '人工确认');
          log('路由提示：你强制了平台，当前设备识别与强制值不同', { device: device, forced: effective });
          return;
        }
        setCheck(el.cRoute, 'ok', '通过');
      }

      function updatePayloadPanel(data) {
        payload = data || payload;
        el.payloadPanel.textContent = JSON.stringify(payload || {}, null, 2);
      }

      function resetChecksForRun() {
        setCheck(el.cAd, '', '未检查');
        setCheck(el.cPreload, '', '未检查');
        setCheck(el.cShow, '', '未检查');
      }

      async function doRequestAd() {
        return new Promise(function (resolve, reject) {
          sdk.requestAd(function (err, nextPayload, detail) {
            if (err) {
              setCheck(el.cAd, 'bad', '失败');
              reject(err);
              return;
            }
            payload = nextPayload;
            updatePayloadPanel(payload);
            setCheck(el.cAd, 'ok', '通过');
            checkRoute(detail.platform || el.platform.value);
            log('adRequest 成功', {
              platform: detail.platform,
              adUrl: detail.adRequestData && detail.adRequestData.url,
              requestParam: detail.adRequestData && detail.adRequestData.param
            });
            resolve(detail);
          });
        });
      }

      async function doPreload() {
        return new Promise(function (resolve, reject) {
          sdk.preload(payload, function (err, response, meta) {
            if (err || (meta && meta.timeout)) {
              setCheck(el.cPreload, 'bad', '失败');
              reject(err || new Error('preLoadVideo 超时'));
              return;
            }
            setCheck(el.cPreload, 'ok', '通过');
            log('preLoadVideo 成功', { response: response, meta: meta });
            resolve(response);
          });
        });
      }

      async function doShow() {
        return new Promise(function (resolve, reject) {
          sdk.show(payload, function (err, response, meta) {
            if (err || (meta && meta.timeout)) {
              setCheck(el.cShow, 'bad', '失败');
              reject(err || new Error('connectVideo 超时'));
              return;
            }
            setCheck(el.cShow, 'ok', '通过');
            log('connectVideo 触发成功', { response: response, meta: meta });
            resolve(response);
          });
        });
      }

      el.btnInit.addEventListener('click', function () {
        try {
          ensureSdk();
          checkRoute(el.platform.value);
          log('初始化完成（真实 bridge 模式）', { device: detectDevice() });
        } catch (e) {
          log('初始化失败', { message: e.message });
        }
      });

      el.btnAd.addEventListener('click', async function () {
        try {
          ensureSdk();
          await doRequestAd();
        } catch (e) {
          log('adRequest 失败', { message: e.message });
        }
      });

      el.btnPreload.addEventListener('click', async function () {
        try {
          ensureSdk();
          await doPreload();
        } catch (e) {
          log('preLoadVideo 失败', { message: e.message });
        }
      });

      el.btnShow.addEventListener('click', async function () {
        try {
          ensureSdk();
          await doShow();
        } catch (e) {
          log('connectVideo 失败', { message: e.message });
        }
      });

      el.btnRunAll.addEventListener('click', async function () {
        resetChecksForRun();
        try {
          ensureSdk();
          await doRequestAd();
          await doPreload();
          await doShow();
          log('一键完整验收通过');
        } catch (e) {
          log('一键完整验收失败', { message: e.message });
        }
      });

      log('页面已就绪：这是上线验收页，仅支持真实 App bridge。');
    })();
  </script>
</body>
</html>
